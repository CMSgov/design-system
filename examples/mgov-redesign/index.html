<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medicare.gov Redesign - React</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Rubik:wght@400&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f0f0f0;
        padding: 48px;
      }
      #root {
        display: flex;
        flex-direction: column;
        gap: 48px;
        align-items: flex-start;
      }
      .variant-group {
        display: flex;
        flex-direction: column;
        align-items: flex-start; /* size children to their content, don't stretch to full width */
        gap: 8px;
      }
      /* Opt-in: stretch this group to fill its parent's width (e.g. full-bleed
         patterns like the bottom bar, so sibling rows share one width). */
      .variant-group--fill {
        align-self: stretch;
      }
      .variant-label {
        font-family: monospace;
        font-size: 12px;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
