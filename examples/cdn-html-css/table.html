<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Design System</title>
    <!-- In a real project this will contain a href link to your local CSS file,
      while in this case we are using a CDN as an example -->
    <link rel="stylesheet" href="https://design.cms.gov/cdn/design-system/12.0.0/css/index.css" />
    <!-- In this case we're loading the core-theme styles which include all the CSS
      variables for the core CMSDS theme, a theme must be loaded for the styles to work -->
    <link
      rel="stylesheet"
      href="https://design.cms.gov/cdn/design-system/12.0.0/css/core-theme.css"
    />
  </head>
  <body class="ds-base ds-l-container">
    <section>
      <h2>Default Table</h2>
      <table class="ds-c-table">
        <caption class="ds-c-table__caption">
          Founding documents
        </caption>
        <thead class="ds-c-table">
          <tr>
            <th scope="col" class="ds-u-text-align--left" id="documentTitle"></th>
            <th scope="col" class="ds-u-text-align--left" id="description"></th>
            <th scope="col" class="ds-u-text-align--left" id="links"></th>
            <th scope="col" class="ds-u-text-align--left" id="year"></th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="ds-u-text-align--left" headers="documentTitle"></td>
            <td class="ds-u-text-align--left" headers="description"></td>
            <td class="ds-u-text-align--left" headers="links"></td>
            <td class="ds-u-text-align--left" headers="year"></td>
          </tr>
          <tr>
            <td class="ds-u-text-align--left" headers="documentTitle"></td>
            <td class="ds-u-text-align--left" headers="description"></td>
            <td class="ds-u-text-align--left" headers="links"></td>
            <td class="ds-u-text-align--left" headers="year"></td>
          </tr>
          <tr>
            <td class="ds-u-text-align--left" headers="documentTitle"></td>
            <td class="ds-u-text-align--left" headers="description"></td>
            <td class="ds-u-text-align--left" headers="links"></td>
            <td class="ds-u-text-align--left" headers="year"></td>
          </tr>
          <tr>
            <td class="ds-u-text-align--left" headers="documentTitle"></td>
            <td class="ds-u-text-align--left" headers="description"></td>
            <td class="ds-u-text-align--left" headers="links"></td>
            <td class="ds-u-text-align--left" headers="year"></td>
          </tr>
        </tbody>
      </table>
    </section>
    <section>
      <h2>Stackable Table</h2>
    </section>
    <section>
      <h2>Multi Header Table</h2>
    </section>
  </body>
</html>
